<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Formulaire</title>
</head>
<body>
    <h1>FORMULAIRE DE COMMANDE</h1>
    <Form>
        <label for=""><b>Nom</b></label><br>
        <input type="text"><br>

        <label for=""><b>Télephone</b></label><br>
        <input type="number"><br>

        <label for=""><b>Adresse</b></label><br>
        <input type="text"><br>

        <label for=""><b>Taille de la pizza</b></label><br>
        <input type="radio" id="S" name="fav_language" value="S">
        <label for="S">S</label><br>

        <input type="radio" id="M" name="fav_language" value="M">
        <label for="M">M</label><br>

        <input type="radio" id="L" name="fav_language" value="L">
        <label for="L">L</label><br>

        <input type="radio" id="XL" name="fav_language" value="XL">
        <label for="XL">XL</label><br>
        <br>

        <label for="">Pate</label><br>
        <select name="Pate" id="">
 <option value="">choisir</option>
<option value="">fine</option>
<option value="">épaisse</option>
<option value="">Sans gluten</option>
    <br>
        </select><br><br>
        <label for="">Ingredients</label><br>
        
        <input type="checkbox" name="ingredients" id="mozzarella" value="mozzarella">
        <label for="mozzarella">Mozzarella</label><br>
        <input type="checkbox" name="ingredients" id="jambon" value="jambon">
        <label for="jambon">Jambon</label><br>
        <input type="checkbox" name="ingredients" id="chorizo" value="chorizo">
        <label for="chorizo">Chorizo</label><br>
        <input type="checkbox" name="ingredients" id="sauce tomate" value="sauce tomate">
        <label for="sauce tomate">Sauce Tomate</label><br>
        <input type="checkbox" name="ingredients" id="pepperoni" value="pepperoni">
        <label for="pepperoni"> Pepperoni</label><br>
        <input type="checkbox" name="ingredients" id="artichauts" value="artichauts">
        <label for="artichauts">Artichauts</label><br>
        <input type="checkbox" name="ingredients" id="champignons" value="champignons">
        <label for="champignons">Champignons</label><br>
        <input type="checkbox" name="ingredients" id="fruit de mer" value="fruit de mer">
        <label for="fruit de mer">Fruit de mer</label><br>

<br>
        <label for="">Quantité</label><br>
        <input type="number" name="quantite" id="quantité" min="1" max="10">
        <br>
        <label for="">Boisson</label><br>
        <select name="boisson" id="">
            <option value="">choisir</option>
            <option value="">CoCa Cola</option>
            <option value="">Sprite</option>
            <option value="">Red bull</option>
            <option value="">Soda</option>
            <option value="">Fanta</option>
            <option value="">Biere</option>
            <option value="">vins</option>
            <option value="">Eau gazeuses</option>
            <option value="">jus de fruit</option>
        </select><br>
        <br>

        <label for="">Instructions Speciales</label><br>
        <textarea name="" id="" cols="60" rows="05"></textarea><br>
        <br>
         <label for="">Mode de livraison</label><br>
         <input type="radio" name=" mode de livraison" id="livraison" value="livraison">
         <label for="">Livraison</label><br>
           <br>
         <input type="radio" name="mode de livraison" id="Retrait" value="retrait">
         <label for="">Retrait</label><br>

         <br>

         <label for="">Heure souhaitée</label><br><br>
         <input type="time" name="time" id="time">



    </Form>
</body>
</html>
