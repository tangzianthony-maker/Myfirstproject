<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de Contact</title>
</head>
<body>
    <form action="">
        <h1><b>Formulaire de Contact</b></h1>

        <label for=""><b>Nom</b></label><br>
        <input type="text"><br>

        <label for=""><b>Prenom</b></label><br>
        <input type="text"><br>

        <label for=""><b>Telephone</b></label><br>
        <input type="number"><br>

        <label for=""><b>Entreprise</b></label><br>
        <input type="text"><br>

        <label for=""><b>Objet du message</b></label><br>
        <select name="objet du message" id="">
            <option value="">choisir</option>
            <option value="">Reclamation</option>
            <option value="">Suggestion</option>
            <option value="">Candidature</option>
            <option value="">Support client</option>
            <option value="">Demande D'informations</option>
            <option value="">Question sur un produit</option>
            <option value="">Demande de rendez-vous</option>
        </select><br>

        <br>
         <label for=""><b>Message</b></label><br>
         <textarea name="" id="" cols="70"  rows="5"></textarea><br>
        <br>
         <label for=""><b>Niveau d'Urgence</b></label><br>
         <input type="radio" id="normal" name="fav_language" value="normal">
         <label for="normal"><b>Normal</b></label><br>

         <input type="radio" id="urgent" name="fav_language" value="normal">
         <label for="urgent"><b>urgent</b></label><br>

         <input type="radio" id="très urgent" name="fav_language" value="très urgent">
         <label for="très urgent"><b>Très Urgent</b></label><br>

         <br>

         <label for=""><b>Preférences de Contact</b></label><br>

         <input type="checkbox" name="contact" id="email" value="email">
         <label for="email"><b>Email</b></label><br>

         <input type="checkbox" name="contact" id="telephone" value="telephone">
         <label for="telephone"><b>Telephone</b></label><br>

         <input type="checkbox" name="contact" id="SMS" value="SMS">
         <label for="SMS"><b>SMS</b></label><br>

         <br>

         <label for="fichier"><b>Ajouter un Fichier</b></label><br>
         <input type="file" id="fichier" name="fichier"><br>

         <br>
         <label for="date"><b>Date souhaitée pour un rappel</b></label><br>
         <input type="date" id="date" name="date"><br>

         <br>
         <label for="heure"><b>Heure de disponibilité</b></label><br>
         <input type="time" id="time" name="time"><br>


          
    </form>
</body>
</html>
